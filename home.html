<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
    <title>Home</title>
  </head>
  <body>
    <h1>home page</h1>
    <button
      class="btn btn-info"
      data-bs-toggle="offcanvas"
      data-bs-target="#search-off"
    >
      search
    </button>
    <div class="row" id="showdata"></div>

    <div class="offcanvas offcanvas-top" style="height: 600px" id="search-off">
      <div class="offcanvas-header">
        <h1>search</h1>
        <button class="btn btn-close" data-bs-dismiss="offcanvas"></button>
      </div>
      <div class="offcanvas-body" onsubmit="searchFun(event)">
        <form action="" class="input-group">
          <input type="text" class="form-control" id="searchInput" />
          <input type="submit" class="btn btn-primary" />
        </form>
        <br /><br />
        <div class="row" id="searchdata"></div>
      </div>
    </div>

    <!-- .card>span{name}
   <div class="card"><span>name</span></div> -->
  </body>
  <script src="./Assets/scripts/home.js"></script>
</html>
